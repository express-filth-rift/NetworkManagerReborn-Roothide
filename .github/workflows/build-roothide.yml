name: Build NetworkManager Roothide

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-roothide:
    name: Build roothide
    runs-on: macos-14
    env:
      THEOS: ${{ github.workspace }}/theos
      THEOS_PACKAGE_SCHEME: roothide
      FINALPACKAGE: 1
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      
      - name: Install packaging tools
        run: |
          brew update
          brew install dpkg ldid make libplist
      
      - name: Install roothide Theos
        run: |
          git clone --recursive https://github.com/roothide/theos.git "$THEOS"
      
      - name: Install iOS SDK
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/theos/sdks.git /tmp/theos-sdks
          git -C /tmp/theos-sdks sparse-checkout set iPhoneOS16.5.sdk
          mkdir -p "$THEOS/sdks"
          cp -R /tmp/theos-sdks/iPhoneOS16.5.sdk "$THEOS/sdks/"
      
      - name: Install CCSupport
        run: |
          git clone https://github.com/opa334/CCSupportTemplates.git $HOME/CCSupportTemplates
          cd $HOME/CCSupportTemplates/
          chmod +x install.sh
          ./install.sh
      
      - name: Build package
        run: |
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$THEOS/bin:$PATH"
          make clean
          make package
      
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: NetworkManagerReborn-Roothide
          path: packages/*.deb
          if-no-files-found: error
