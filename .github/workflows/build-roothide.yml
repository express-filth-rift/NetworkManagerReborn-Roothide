name: Build NetworkManager DualSIM

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-roothide:
    name: Build roothide
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      
      - name: Install packaging tools
        run: |
          brew update
          brew install dpkg ldid make libplist
      
      - name: Install roothide Theos
        run: |
          git clone --recursive https://github.com/roothide/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
      
      - name: Install iOS SDK
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/theos/sdks.git /tmp/theos-sdks
          git -C /tmp/theos-sdks sparse-checkout set iPhoneOS16.5.sdk
          mkdir -p $HOME/theos/sdks
          cp -R /tmp/theos-sdks/iPhoneOS16.5.sdk $HOME/theos/sdks/
      
      - name: Install CCSupport
        run: |
          git clone https://github.com/opa334/CCSupportTemplates.git $HOME/CCSupportTemplates
          cd $HOME/CCSupportTemplates/
          chmod +x install.sh
          ./install.sh
      
      - name: Build package
        run: |
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$HOME/theos/bin:$PATH"
          export THEOS_PACKAGE_SCHEME=roothide
          export FINALPACKAGE=1
          make clean
          make package
      
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: networkmanager-dualsim-roothide
          path: packages/*.deb
          if-no-files-found: error
